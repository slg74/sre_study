<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linux SRE Interview Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #2ea043;
      --green-bg: #0d2818;
      --green-border: #238636;
      --red: #f85149;
      --red-bg: #2d0f0f;
      --red-border: #da3633;
      --yellow: #d29922;
      --yellow-bg: #2d2208;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
      width: 100%;
      max-width: 720px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    header p { color: var(--muted); font-size: 0.875rem; }

    .progress-wrap { width: 100%; max-width: 720px; margin-bottom: 24px; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .section-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--yellow);
      background: var(--yellow-bg);
      border: 1px solid var(--yellow);
      border-radius: 4px;
      padding: 2px 8px;
      margin-bottom: 16px;
    }

    .question-text {
      font-size: 1.1rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 24px;
      color: var(--text);
    }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-size: 0.925rem;
      line-height: 1.5;
      transition: border-color 0.15s, background 0.15s;
      width: 100%;
    }

    .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #1c2330; }
    .option-btn:disabled { cursor: default; }

    .option-label {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--border);
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.15s;
    }

    .option-btn.correct { background: var(--green-bg); border-color: var(--green-border); color: #56d364; }
    .option-btn.correct .option-label { background: var(--green); color: #fff; }
    .option-btn.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
    .option-btn.wrong .option-label { background: var(--red); color: #fff; }
    .option-btn.dimmed { opacity: 0.45; }

    .feedback {
      margin-top: 20px;
      padding: 16px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.6;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.correct-fb { background: var(--green-bg); border: 1px solid var(--green-border); color: #56d364; }
    .feedback.wrong-fb { background: var(--red-bg); border: 1px solid var(--red-border); color: #ffa198; }
    .feedback strong { display: block; margin-bottom: 4px; }

    .feedback .study-ref {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.82rem;
      color: var(--muted);
    }

    .feedback .study-ref span { color: var(--accent); font-weight: 600; }

    .actions { margin-top: 24px; display: flex; justify-content: flex-end; }

    .btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* Score screen */
    #score-screen { display: none; width: 100%; max-width: 720px; text-align: center; }

    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 28px;
    }

    .score-number { font-size: 4rem; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 8px; }
    .score-label { font-size: 1rem; color: var(--muted); margin-bottom: 24px; }
    .score-grade { font-size: 1.25rem; font-weight: 600; margin-bottom: 32px; }

    .score-breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
      margin-bottom: 32px;
      max-height: 360px;
      overflow-y: auto;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.82rem;
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .breakdown-item.pass { border-color: var(--green-border); }
    .breakdown-item.fail { border-color: var(--red-border); }

    .breakdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .breakdown-dot.pass { background: var(--green); }
    .breakdown-dot.fail { background: var(--red); }

    .breakdown-item .section-tag {
      color: var(--yellow);
      font-weight: 600;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .restart-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: var(--radius);
      padding: 10px 32px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .restart-btn:hover { background: rgba(88,166,255,0.1); }

    /* Start screen */
    #start-screen { width: 100%; max-width: 720px; text-align: center; }

    .start-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 28px;
    }

    .start-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }

    .start-card p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 24px;
    }

    .topic-filter { margin-bottom: 22px; text-align: left; }
    .filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .filter-title { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .filter-actions { display: flex; gap: 8px; }
    .filter-btn {
      font-size: 0.72rem; padding: 3px 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .topic-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    @media (max-width: 540px) { .topic-grid { grid-template-columns: 1fr; } }
    .topic-group {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    }
    .group-header-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; font-weight: 700; color: var(--text);
      cursor: pointer; margin-bottom: 8px; user-select: none;
    }
    .group-header-label input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
    .section-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.75rem; color: var(--muted); cursor: pointer; padding: 2px 0; user-select: none;
    }
    .section-item:hover { color: var(--text); }
    .section-item input[type=checkbox] { accent-color: var(--accent); width: 13px; height: 13px; cursor: pointer; flex-shrink: 0; }
    .section-item .q-ct { margin-left: auto; font-size: 0.68rem; color: #444d56; }
    .avail-bar { text-align: center; margin-top: 6px; }
    .avail-count { font-size: 0.82rem; color: var(--accent); font-weight: 600; }

    /* Question count selector */
    .count-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .count-options {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .count-btn {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 700;
      padding: 12px 28px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      min-width: 80px;
    }

    .count-btn:hover { border-color: var(--accent); color: var(--accent); }

    .count-btn.selected {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88,166,255,0.08);
    }

    .count-sub {
      display: block;
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @media (max-width: 480px) {
      .card, .score-card, .start-card { padding: 20px 16px; }
      .question-text { font-size: 1rem; }
      .score-number { font-size: 3rem; }
      .count-btn { padding: 10px 18px; min-width: 64px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Linux SRE Interview Quiz</h1>
  <p>Test your knowledge across all sections of the study guide</p>
</header>

<div id="start-screen">
  <div class="start-card">
    <h2>SRE Quiz</h2>

    <div class="topic-filter">
      <div class="filter-header">
        <span class="filter-title">Choose Topics</span>
        <div class="filter-actions">
          <button class="filter-btn" onclick="selectAllTopics()">All</button>
          <button class="filter-btn" onclick="clearAllTopics()">None</button>
        </div>
      </div>
      <div class="topic-grid" id="topic-grid"></div>
      <div class="avail-bar">
        <span class="avail-count" id="avail-count"></span>
      </div>
    </div>

    <div class="count-label">How many questions?</div>
    <div class="count-options">
      <button class="count-btn" data-count="10" onclick="selectCount(this)">10<span class="count-sub">quick</span></button>
      <button class="count-btn selected" data-count="20" onclick="selectCount(this)">20<span class="count-sub">standard</span></button>
      <button class="count-btn" data-count="50" onclick="selectCount(this)">50<span class="count-sub">thorough</span></button>
      <button class="count-btn" data-count="100" onclick="selectCount(this)">100<span class="count-sub">full grind</span></button>
    </div>

    <button class="btn" id="start-btn" onclick="startQuiz()">Start Quiz</button>
  </div>
</div>

<div id="quiz-screen" style="display:none; width:100%; max-width:720px;">
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="q-counter">Question 1 of 20</span>
      <span id="score-live">Score: 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-badge" id="section-badge">Section</div>
    <div class="question-text" id="question-text">Loading…</div>
    <div class="options" id="options-container"></div>
    <div class="feedback" id="feedback"></div>
    <div class="actions">
      <button class="btn" id="next-btn" style="display:none" onclick="nextQuestion()">Next →</button>
    </div>
  </div>
</div>

<div id="score-screen">
  <div class="score-card">
    <div class="score-number" id="final-score">0/0</div>
    <div class="score-label">questions correct</div>
    <div class="score-grade" id="score-grade"></div>
    <div class="score-breakdown" id="score-breakdown"></div>
    <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  // ── Section 1: Magic Numbers ──────────────────────────────────────────────
  {
    section: "Section 1: The Magic Numbers",
    question: "What is the Linux memory page size (and the default ext4/xfs block size)?",
    options: ["1024 bytes (1 KiB)", "2048 bytes (2 KiB)", "4096 bytes (4 KiB)", "8192 bytes (8 KiB)"],
    answer: 2,
    explanation: "4096 bytes = 2^12 = 4 KiB is the default memory page size and ext4/xfs block size. Nearly every memory-alignment story in Linux traces back to this number."
  },
  {
    section: "Section 1: The Magic Numbers",
    question: "Why do old Linux systems wrap PIDs at 32768?",
    options: [
      "It's the default value of /proc/sys/kernel/threads-max",
      "32768 = 2^15 is the historical default pid_max, stored in /proc/sys/kernel/pid_max",
      "It's the per-user process limit (ulimit -u)",
      "32768 is the size of the kernel call stack"
    ],
    answer: 1,
    explanation: "32768 = 2^15 is the historical compiled-in default for pid_max. Once reached, the kernel wraps back around. Still the default on minimal installs; systemd raises it on modern systems."
  },
  {
    section: "Section 1: The Magic Numbers",
    question: "The TCP/UDP port space is 65536 ports. Why exactly that number?",
    options: [
      "It matches the default pid_max (32768 × 2)",
      "65536 = 2^16 because the TCP/UDP header's port field is 16 bits wide (ports 0–65535)",
      "It's an arbitrary IANA decision",
      "4096 ports × 16 reserved ranges = 65536"
    ],
    answer: 1,
    explanation: "The port field in the TCP and UDP headers is 16 bits → 2^16 = 65536 possible values (0–65535). Ephemeral range defaults to 32768–60999 (~28k ports)."
  },
  {
    section: "Section 1: The Magic Numbers",
    question: "What does modern systemd (v243+) raise pid_max to at boot, and what power of 2 is it?",
    options: ["65536 — 2^16", "1048576 — 2^20", "4194304 — 2^22", "2147483648 — 2^31"],
    answer: 2,
    explanation: "Systemd v243+ raises pid_max to 4194304 = 2^22, the kernel's PID_MAX_LIMIT on 64-bit. Verify with: cat /proc/sys/kernel/pid_max"
  },
  {
    section: "Section 1: The Magic Numbers",
    question: "You're seeing 'Cannot assign requested address' + TIME_WAIT pileup in ss -s. What is the root cause?",
    options: [
      "The destination server is rejecting connections",
      "Ephemeral port exhaustion — the 32768–60999 range is exhausted per src-IP/dest pair",
      "The firewall is dropping SYN packets",
      "The process has hit its RLIMIT_NOFILE limit"
    ],
    answer: 1,
    explanation: "Each outbound TCP connection consumes one ephemeral port. Default range 32768–60999 ≈ 28k ports. Fixes: widen the range, tcp_tw_reuse, more source IPs, or connection pooling."
  },

  // ── Section 2: Memory ─────────────────────────────────────────────────────
  {
    section: "Section 2: The Memory Story",
    question: "In 'free -m' output, which metric tells you how much memory is actually available to start new applications?",
    options: ["free", "used", "available", "shared"],
    answer: 2,
    explanation: "'available' = free RAM + reclaimable page cache. 'used' is misleading — it includes page cache the kernel hands back instantly. 500 MB 'free' on a 32 GB box is healthy ('Linux ate my RAM' trap)."
  },
  {
    section: "Section 2: The Memory Story",
    question: "What is RSS vs VSZ in a process's memory stats?",
    options: [
      "RSS = total virtual address space mapped; VSZ = pages actually in RAM",
      "RSS = pages actually resident in physical RAM (working set); VSZ = total virtual address space mapped",
      "RSS = resident swap size; VSZ = virtual swap zone",
      "They're the same metric reported in different units"
    ],
    answer: 1,
    explanation: "RSS (Resident Set Size) = pages actually in physical RAM. VSZ = total virtual address space mapped. Huge VSZ + small RSS is completely normal for JVMs and Go binaries."
  },
  {
    section: "Section 2: The Memory Story",
    question: "A container exits with code 137. What happened?",
    options: [
      "The application threw an unhandled exception and exited with code 1",
      "The process received SIGTERM and exited cleanly via its shutdown hook",
      "The cgroup OOM killer fired SIGKILL (128 + 9 = 137)",
      "The process exceeded its CPU quota and was suspended"
    ],
    answer: 2,
    explanation: "137 = 128 + 9 (SIGKILL). The cgroup OOM killer killed the process because it exceeded its memory limit. Host free RAM is irrelevant — it's the cgroup that matters."
  },
  {
    section: "Section 2: The Memory Story",
    question: "What does vm.swappiness control, and why can a box with 'free' RAM still be swapping?",
    options: [
      "Whether the swap partition is enabled; free RAM prevents swapping",
      "The swap file size multiplier; free RAM is always used before swap",
      "The kernel's tendency to proactively move cold anonymous pages to swap to preserve page cache",
      "The maximum swap space used as a percentage of RAM"
    ],
    answer: 2,
    explanation: "vm.swappiness makes the kernel proactively swap cold anonymous pages to keep page cache warm. A box with free RAM can actively be swapping — this is by design, not a bug."
  },
  {
    section: "Section 2: The Memory Story",
    question: "How do you protect a critical process (e.g., your monitoring agent) from the OOM killer?",
    options: [
      "Set RLIMIT_MEMLOCK to unlimited for the process",
      "Set oom_score_adj = -1000 (or systemd OOMScoreAdjust=-1000 in the unit file)",
      "Use mlockall() to lock all pages into RAM",
      "Increase vm.swappiness to 100"
    ],
    answer: 1,
    explanation: "oom_score_adj ranges from -1000 to +1000. Setting -1000 tells the OOM killer to never select this process. Use systemd OOMScoreAdjust= in the unit file for managed services."
  },

  // ── Section 3: Process Lifecycle ─────────────────────────────────────────
  {
    section: "Section 3: Process Lifecycle",
    question: "A process shows state 'D' in ps output. What is true about it?",
    options: [
      "It is dead — a zombie waiting to be reaped by its parent",
      "It is in uninterruptible sleep, alive but blocked mid-syscall on I/O, immune to kill -9, counts toward load average",
      "It has been stopped with SIGSTOP and is suspended",
      "It is a daemon that has detached from its terminal"
    ],
    answer: 1,
    explanation: "D = Uninterruptible sleep. Alive, stuck mid-kernel-syscall (almost always I/O). kill -9 queues but doesn't land until the syscall returns. Counts toward load average. 'Dying to finish.'"
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "What is a zombie process, and does it consume significant resources?",
    options: [
      "A process consuming 100% CPU in a tight loop — uses all CPU resources",
      "A process stuck on I/O — uses no CPU but holds kernel resources",
      "A process that has exited; just a PID + exit status awaiting parent's wait(). Uses no memory or CPU",
      "A process that has been orphaned; uses normal resources until reaped by init"
    ],
    answer: 2,
    explanation: "Zombie = already exited. Only occupies a PID slot and a small kernel struct holding the exit status. Does NOT count toward load average. Problem: enough zombies → fork() fails because PIDs are exhausted."
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "Complete the symmetry sentence: 'A zombie is freed by its ___; a D-state process is freed by its ___.'",
    options: [
      "init / scheduler",
      "parent via wait() / I/O completing or erroring out",
      "kernel GC / OOM killer",
      "scheduler / parent"
    ],
    answer: 1,
    explanation: "Zombie freed by parent calling wait(). D-state freed by I/O completing, erroring (umount -f / timeout), or reboot. One's fate is upstream (parent), the other downstream (storage/network)."
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "fork() fails with EAGAIN. Which limit is NOT a cause of this?",
    options: [
      "Per-user ulimit -u (RLIMIT_NPROC)",
      "Kernel-wide /proc/sys/kernel/pid_max",
      "cgroup pids.max (systemd TasksMax=)",
      "System-wide fs.file-max"
    ],
    answer: 3,
    explanation: "fs.file-max is a file descriptor limit — hitting it causes EMFILE on open(), not EAGAIN on fork(). fork() EAGAIN = RLIMIT_NPROC, pid_max, or cgroup pids.max."
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "What happens to an orphan process whose parent dies?",
    options: [
      "It immediately becomes a zombie and waits to be reaped",
      "It receives SIGHUP and typically exits",
      "It is adopted by init/systemd (PID 1), which will reap it when it eventually exits",
      "It continues running but leaks as an unreaped process forever"
    ],
    answer: 2,
    explanation: "When a parent dies, its children are re-parented to init/systemd (PID 1). init automatically calls wait() and reaps them when they exit. Orphans are alive and functional — distinct from zombies."
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "You have a zombie pileup. Why can't you just 'kill -9' the zombies?",
    options: [
      "kill -9 requires root and you're running as a user",
      "Zombies are already dead — SIGKILL has nothing to kill. Fix the PARENT (make it call wait()) or restart it",
      "kill -9 is blocked by kernel security policy for zombie processes",
      "You must use kill -17 (SIGCHLD) to force zombie cleanup"
    ],
    answer: 1,
    explanation: "Zombies are already dead — no process to kill. Each holds a PID slot. Fix: get the parent to call wait() (fix the bug or restart the parent — init then adopts and reaps orphaned children)."
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "What does execve() do to the current process?",
    options: [
      "Creates a new child process that runs the new program (same as fork + exec)",
      "Replaces the current process's memory image with the new program — same PID, new code and data",
      "Copies the current process and runs the new program in the copy",
      "Suspends the current process and starts a new one alongside it"
    ],
    answer: 1,
    explanation: "execve() replaces the calling process's text, data, and stack with the new program. The PID stays the same. This is the 'exec' half of the classic fork→exec pattern."
  },
  {
    section: "Section 3: Process Lifecycle",
    question: "What is Copy-on-Write (COW) in the context of fork()?",

// ── Quiz State ───────────────────────────────────────────────────────────────
let questions = [];
let current = 0;
let score = 0;
let results = [];
let answered = false;
let selectedCount = 20;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function selectCount(btn) {
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCount = parseInt(btn.dataset.count);
}

function startQuiz() {
  const pool = shuffle(ALL_QUESTIONS.filter(q => selectedSections.has(q.section)));
  if (pool.length === 0) return;
  questions = pool.slice(0, Math.min(selectedCount, pool.length));
  current = 0;
  score = 0;
  results = [];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('score-live').textContent = `Score: ${score}`;
  document.getElementById('progress-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('section-badge').textContent = q.section;
  document.getElementById('question-text').textContent = q.question;

  const labels = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('options-container');
  container.innerHTML = '';

  const shuffledIndices = shuffle([0, 1, 2, 3]);

  shuffledIndices.forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.origIdx = origIdx;
    btn.innerHTML = `<span class="option-label">${labels[pos]}</span><span>${q.options[origIdx]}</span>`;
    btn.addEventListener('click', () => handleAnswer(btn, origIdx === q.answer, q));
    container.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
  document.getElementById('next-btn').style.display = 'none';
}

function handleAnswer(btn, isCorrect, q) {
  if (answered) return;
  answered = true;

  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    const origIdx = parseInt(b.dataset.origIdx);
    if (origIdx === q.answer) {
      b.classList.add('correct');
    } else if (b === btn && !isCorrect) {
      b.classList.add('wrong');
    } else {
      b.classList.add('dimmed');
    }
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>Correct!</strong>${q.explanation}`;
  } else {
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>Not quite.</strong>${q.explanation}<div class="study-ref">📖 Review: <span>${q.section}</span> in the cheatsheet</div>`;
  }

  document.getElementById('score-live').textContent = `Score: ${score}`;
  results.push({ q, correct: isCorrect });

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'inline-block';
  nextBtn.textContent = current + 1 < questions.length ? 'Next →' : 'See Results';
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('score-screen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('final-score').textContent = `${score}/${total}`;

  const grade = pct >= 90 ? 'Outstanding — you\'re ready to interview.' :
                pct >= 75 ? 'Strong — a few topics to review.' :
                pct >= 60 ? 'Getting there — hit the weak sections.' :
                            'Keep studying — you\'ve got this.';
  document.getElementById('score-grade').textContent = grade;

  const breakdown = document.getElementById('score-breakdown');
  breakdown.innerHTML = '';
  results.forEach(({ q, correct }) => {
    const div = document.createElement('div');
    div.className = `breakdown-item ${correct ? 'pass' : 'fail'}`;
    const shortSection = q.section.replace('Section ', '§').split(':')[0];
    div.innerHTML = `
      <div class="breakdown-dot ${correct ? 'pass' : 'fail'}"></div>
      <span class="section-tag">${shortSection}</span>
      <span style="color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${q.question}</span>
    `;
    breakdown.appendChild(div);
  });
}

function restartQuiz() {
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}

// Topic groups for section filtering
const TOPIC_GROUPS = [
  { id: 'linux', label: 'Linux Fundamentals',
    topics: ['Section 1: The Magic Numbers','Section 2: The Memory Story','Section 3: Process Lifecycle','Section 4: Signals','Section 5: D-State / Load Average','Section 6: Files, FDs, Inodes','Section 7: DNS Resolution Path','Section 8: Advanced Linux SRE'] },
  { id: 'aws', label: 'Terraform & AWS',
    topics: ['Section 10: Terraform','Section 11: IAM','Section 12: EC2','Section 13: ECS','Section 14: RDS','Section 15: The SRE Layer','AWS: Networking & VPC','AWS: Lambda & Serverless','AWS: S3 & Storage','AWS: Auto Scaling & High Availability','AWS: KMS & Security','AWS: CloudFormation'] },
  { id: 'k8s', label: 'Containers & Kubernetes',
    topics: ['Section 16: Containers Under the Hood','Section 17: Kubernetes Core','Section 18: K8s Debugging Playbook'] },
  { id: 'identity', label: 'Identity & Security',
    topics: ['Section 19: OAuth 2.0 & OIDC','Section 19: SAML & SSO (Okta / OneLogin)','Section 19: LDAP','Section 20: PKI & TLS Certificates'] },
  { id: 'precision', label: 'Precision Drills §21',
    topics: ['§21 Precision: Load Average','§21 Precision: Orphan vs Zombie','§21 Precision: 4096 & Memory','§21 Precision: D-State Exit Paths','§21 Precision: pid_max & Process Limits'] },
  { id: 'sysdesign', label: 'System Design',
    topics: ['Section 22: System Design'] },
];

let selectedSections = new Set(TOPIC_GROUPS.flatMap(g => g.topics));

function displayName(s) {
  return s.replace(/^Section \d+:\s*/, '').replace(/^§\d+ Precision:\s*/, '');
}

function qCount(section) {
  return ALL_QUESTIONS.filter(q => q.section === section).length;
}

function buildTopicFilter() {
  const grid = document.getElementById('topic-grid');
  TOPIC_GROUPS.forEach(group => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'topic-group';

    const headerLabel = document.createElement('label');
    headerLabel.className = 'group-header-label';
    const groupCheck = document.createElement('input');
    groupCheck.type = 'checkbox';
    groupCheck.checked = true;
    groupCheck.dataset.groupId = group.id;
    groupCheck.addEventListener('change', () => toggleGroup(group.id, groupCheck.checked));
    headerLabel.appendChild(groupCheck);
    headerLabel.appendChild(document.createTextNode(' ' + group.label));
    groupDiv.appendChild(headerLabel);

    group.topics.forEach(topic => {
      const label = document.createElement('label');
      label.className = 'section-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.dataset.section = topic;
      cb.dataset.groupId = group.id;
      cb.addEventListener('change', () => {
        if (cb.checked) selectedSections.add(topic); else selectedSections.delete(topic);
        syncGroupCheckbox(group.id);
        updateAvailableCount();
      });
      const nameSpan = document.createElement('span');
      nameSpan.textContent = displayName(topic);
      const ctSpan = document.createElement('span');
      ctSpan.className = 'q-ct';
      ctSpan.textContent = qCount(topic) + 'q';
      label.appendChild(cb);
      label.appendChild(nameSpan);
      label.appendChild(ctSpan);
      groupDiv.appendChild(label);
    });

    grid.appendChild(groupDiv);
  });
  updateAvailableCount();
}

function toggleGroup(groupId, checked) {
  const group = TOPIC_GROUPS.find(g => g.id === groupId);
  group.topics.forEach(topic => { if (checked) selectedSections.add(topic); else selectedSections.delete(topic); });
  document.querySelectorAll(`input[data-group-id="${groupId}"][data-section]`).forEach(cb => cb.checked = checked);
  updateAvailableCount();
}

function syncGroupCheckbox(groupId) {
  const group = TOPIC_GROUPS.find(g => g.id === groupId);
  const allChecked = group.topics.every(t => selectedSections.has(t));
  const groupCb = document.querySelector(`input[data-group-id="${groupId}"]:not([data-section])`);
  if (groupCb) groupCb.checked = allChecked;
}

function selectAllTopics() {
  TOPIC_GROUPS.forEach(g => g.topics.forEach(t => selectedSections.add(t)));
  document.querySelectorAll('#topic-grid input[type=checkbox]').forEach(cb => cb.checked = true);
  updateAvailableCount();
}

function clearAllTopics() {
  selectedSections.clear();
  document.querySelectorAll('#topic-grid input[type=checkbox]').forEach(cb => cb.checked = false);
  updateAvailableCount();
}

function updateAvailableCount() {
  const avail = ALL_QUESTIONS.filter(q => selectedSections.has(q.section)).length;
  const el = document.getElementById('avail-count');
  el.textContent = avail === 0 ? 'No topics selected' : `${avail} question${avail === 1 ? '' : 's'} available`;
  el.style.color = avail === 0 ? 'var(--wrong)' : 'var(--accent)';
  const startBtn = document.getElementById('start-btn');
  startBtn.disabled = avail === 0;
  startBtn.style.opacity = avail === 0 ? '0.4' : '1';
  startBtn.style.cursor = avail === 0 ? 'not-allowed' : 'pointer';
}

buildTopicFilter();
</script>
